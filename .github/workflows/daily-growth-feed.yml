name: Daily Growth Feed

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: daily-growth-feed
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate current content files
        run: python scripts/generate_daily_growth.py --validate-only

      - name: Generate daily growth feed entry
        env:
          GITHUB_TOKEN: ${{ github.token }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GITHUB_MODEL: openai/gpt-4o
        run: python scripts/generate_daily_growth.py

      - name: Commit directly to main
        run: |
          if git diff --quiet; then
            echo "No content changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add growth-feed.json content_pool.json images
          git commit -m "Add daily growth feed"
          git pull --rebase origin main
          git push origin HEAD:main
